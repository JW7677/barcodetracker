<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Barcode Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --border2: #363650;
    --primary: #7c6af7;
    --primary-dim: rgba(124,106,247,0.15);
    --accent: #00e5c0;
    --accent-dim: rgba(0,229,192,0.12);
    --warn: #ff6b6b;
    --success: #4ade80;
    --text: #f0f0fa;
    --text2: #8888aa;
    --text3: #55556a;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --r: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px; }

  #app { display:flex; flex-direction:column; height:100dvh; max-width:430px; margin:0 auto; overflow:hidden; }

  /* HEADER */
  .header { padding:16px 20px 14px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; position:relative; }
  .header::after { content:''; position:absolute; bottom:0; left:20px; width:36px; height:3px; background:var(--primary); border-radius:2px; }
  .header-title { font-size:19px; font-weight:700; letter-spacing:-0.3px; }
  .header-badge { font-family:var(--mono); font-size:11px; color:var(--primary); background:var(--primary-dim); padding:3px 9px; border-radius:20px; border:1px solid rgba(124,106,247,0.3); }

  /* SCREENS */
  .screen { display:none; flex:1; overflow-y:auto; flex-direction:column; }
  .screen.active { display:flex; }

  /* TAB BAR */
  .tabbar { display:flex; background:var(--surface); border-top:1px solid var(--border); padding:8px 4px env(safe-area-inset-bottom,8px); flex-shrink:0; gap:2px; }
  .tab-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 4px; border:none; background:none; cursor:pointer; border-radius:12px; transition:background 0.15s; }
  .tab-btn.active { background:var(--primary-dim); }
  .tab-icon { font-size:20px; color:var(--text3); transition:color 0.15s; }
  .tab-btn.active .tab-icon { color:var(--primary); }
  .tab-label { font-size:10px; font-weight:600; letter-spacing:0.3px; color:var(--text3); transition:color 0.15s; }
  .tab-btn.active .tab-label { color:var(--primary); }

  /* SCAN SCREEN */
  #screen-scan { background:#000; position:relative; }
  #video-wrap { flex:1; position:relative; overflow:hidden; background:#000; }
  #preview { width:100%; height:100%; object-fit:cover; display:block; }

  .scan-overlay { position:absolute; inset:0; pointer-events:none; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .scan-shade { position:absolute; inset:0; }
  .scan-frame-wrap { position:relative; z-index:1; }
  .scan-frame { width:240px; height:240px; position:relative; }
  .scan-frame::before,.scan-frame::after,.scan-frame .c3,.scan-frame .c4 { content:''; position:absolute; width:32px; height:32px; border-color:var(--primary); border-style:solid; }
  .scan-frame::before { top:0;left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
  .scan-frame::after  { top:0;right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
  .scan-frame .c3     { bottom:0;left:0; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
  .scan-frame .c4     { bottom:0;right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
  .scan-line { position:absolute; left:8px; right:8px; top:50%; height:2px; background:linear-gradient(90deg,transparent,var(--primary),transparent); animation:scanline 2s ease-in-out infinite; }
  @keyframes scanline { 0%,100%{top:15%;opacity:0} 10%{opacity:1} 90%{opacity:1} 50%{top:85%} }

  /* canvas overlay for drawing on video */
  #scan-canvas { position:absolute; inset:0; width:100%; height:100%; opacity:0; }

  .scan-hint { position:absolute; bottom:32px; left:0; right:0; text-align:center; font-size:13px; color:rgba(255,255,255,0.75); font-weight:500; z-index:2; padding:0 20px; }

  .scan-start-btn { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:#000; cursor:pointer; border:none; color:var(--text); z-index:10; }
  .scan-start-icon { width:80px; height:80px; border-radius:50%; background:var(--primary-dim); border:2px solid var(--primary); display:flex; align-items:center; justify-content:center; font-size:36px; }
  .scan-start-label { font-size:16px; font-weight:600; color:var(--text2); }

  /* MODAL */
  .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--surface); border-radius:24px 24px 0 0; border:1px solid var(--border); border-bottom:none; width:100%; max-width:430px; padding:16px 20px 40px; animation:slideUp 0.25s cubic-bezier(0.32,0.72,0,1); }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 20px; }
  .modal-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .modal-title { font-size:19px; font-weight:700; }
  .barcode-box { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px; margin-bottom:16px; }
  .barcode-lbl { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); margin-bottom:4px; }
  .barcode-val { font-family:var(--mono); font-size:13px; color:var(--accent); word-break:break-all; }
  .existing-notice { display:flex; gap:8px; align-items:flex-start; background:var(--accent-dim); border:1px solid rgba(0,229,192,0.2); border-radius:var(--r); padding:10px 12px; margin-bottom:16px; font-size:13px; color:var(--accent); line-height:1.5; }
  .field-label { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:6px; margin-top:14px; }
  .field-input { width:100%; background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--r); padding:13px 14px; font-size:15px; font-family:var(--sans); color:var(--text); outline:none; transition:border-color 0.15s; }
  .field-input:focus { border-color:var(--primary); }
  .field-input::placeholder { color:var(--text3); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn { flex:1; padding:14px; border-radius:var(--r); font-size:15px; font-weight:700; font-family:var(--sans); cursor:pointer; border:none; display:flex; align-items:center; justify-content:center; gap:6px; transition:opacity 0.15s,transform 0.1s; }
  .btn:active { transform:scale(0.97); }
  .btn-ghost { background:var(--surface2); border:1px solid var(--border); color:var(--text2); flex:0.7; }
  .btn-primary { background:var(--primary); color:#fff; flex:1.3; }

  /* RECORDS */
  .search-bar { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r); margin:14px 16px 0; padding:10px 14px; flex-shrink:0; }
  .search-bar input { flex:1; border:none; background:none; font-size:15px; font-family:var(--sans); color:var(--text); outline:none; }
  .search-bar input::placeholder { color:var(--text3); }
  .filter-row { display:flex; gap:6px; align-items:center; padding:10px 16px 6px; flex-shrink:0; }
  .filter-chip { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid var(--border); background:var(--surface2); color:var(--text2); cursor:pointer; transition:all 0.15s; }
  .filter-chip.active { background:var(--primary); border-color:var(--primary); color:#fff; }
  .count-badge { margin-left:auto; font-size:11px; color:var(--text3); font-family:var(--mono); }
  .records-list { flex:1; overflow-y:auto; padding:8px 16px 16px; display:flex; flex-direction:column; gap:8px; }
  .record-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px; display:flex; gap:12px; align-items:flex-start; animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .record-avatar { width:40px; height:40px; border-radius:50%; background:var(--primary-dim); border:1px solid rgba(124,106,247,0.3); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; color:var(--primary); flex-shrink:0; }
  .record-body { flex:1; min-width:0; }
  .record-name { font-weight:700; font-size:15px; margin-bottom:3px; }
  .record-site { font-size:12px; color:var(--accent); display:flex; align-items:center; gap:4px; margin-bottom:4px; }
  .record-barcode { font-family:var(--mono); font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .record-date { font-size:10px; color:var(--text3); margin-top:4px; }
  .record-delete { background:none; border:none; cursor:pointer; color:var(--text3); padding:4px; font-size:16px; flex-shrink:0; transition:color 0.15s; }
  .record-delete:active { color:var(--warn); }

  /* EMAIL */
  .export-all-btn { margin:14px 16px 0; width:calc(100% - 32px); padding:15px; background:linear-gradient(135deg,#10b981,#059669); border:none; border-radius:var(--r); color:#fff; font-size:15px; font-weight:700; font-family:var(--sans); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity 0.15s,transform 0.1s; flex-shrink:0; }
  .export-all-btn:active { transform:scale(0.98); }
  .email-tabs { display:flex; gap:4px; margin:12px 16px 4px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r); padding:4px; flex-shrink:0; }
  .email-tab { flex:1; padding:9px; border:none; border-radius:10px; background:none; color:var(--text2); font-size:13px; font-weight:600; font-family:var(--sans); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.15s; }
  .email-tab.active { background:var(--primary); color:#fff; }
  .email-list { flex:1; overflow-y:auto; padding:8px 16px 16px; display:flex; flex-direction:column; gap:8px; }
  .email-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px; display:flex; align-items:center; gap:12px; }
  .email-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:17px; flex-shrink:0; }
  .email-avatar.user-av { background:var(--primary-dim); color:var(--primary); border:1px solid rgba(124,106,247,0.3); }
  .email-avatar.site-av { background:var(--accent-dim); color:var(--accent); border:1px solid rgba(0,229,192,0.25); font-size:20px; }
  .email-info { flex:1; min-width:0; }
  .email-name { font-weight:700; font-size:15px; margin-bottom:3px; }
  .email-count { font-size:12px; color:var(--text2); }
  .email-send-btn { padding:8px 16px; border-radius:10px; border:none; background:var(--primary); color:#fff; font-size:13px; font-weight:700; font-family:var(--sans); cursor:pointer; display:flex; align-items:center; gap:5px; flex-shrink:0; transition:opacity 0.15s,transform 0.1s; }
  .email-send-btn.site-btn { background:var(--accent); color:#0a0a0f; }
  .email-send-btn:active { transform:scale(0.96); }

  /* EMPTY STATE */
  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:40px 20px; color:var(--text3); }
  .empty-icon { font-size:52px; opacity:0.4; }
  .empty-title { font-size:17px; font-weight:700; color:var(--text2); }
  .empty-sub { font-size:14px; text-align:center; line-height:1.5; }

  /* TOAST */
  .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); border-radius:30px; padding:10px 20px; font-size:13px; font-weight:600; color:var(--text); z-index:200; opacity:0; transition:all 0.3s cubic-bezier(0.32,0.72,0,1); white-space:nowrap; display:flex; align-items:center; gap:8px; box-shadow:0 8px 32px rgba(0,0,0,0.4); pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:var(--success); }
  .toast.error   { border-color:var(--warn); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="header-title" id="header-title">Scan Barcode</span>
    <span class="header-badge" id="header-badge">SCANNER</span>
  </div>

  <!-- SCAN -->
  <div class="screen active" id="screen-scan">
    <div id="video-wrap">
      <video id="preview" playsinline autoplay muted></video>
      <canvas id="scan-canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame-wrap">
          <div class="scan-frame">
            <div class="c3"></div><div class="c4"></div>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>
      <div class="scan-hint" id="scan-hint">Align barcode within the frame</div>
      <button class="scan-start-btn" id="scan-start-btn" onclick="startScanner()">
        <div class="scan-start-icon">📷</div>
        <div class="scan-start-label">Tap to start camera</div>
      </button>
    </div>
  </div>

  <!-- RECORDS -->
  <div class="screen" id="screen-records">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Search records…" oninput="filterRecords()">
    </div>
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter(this,'all')">All</button>
      <button class="filter-chip" onclick="setFilter(this,'username')">User</button>
      <button class="filter-chip" onclick="setFilter(this,'site')">Site</button>
      <span class="count-badge" id="count-badge">0 records</span>
    </div>
    <div class="records-list" id="records-list"></div>
  </div>

  <!-- EMAIL -->
  <div class="screen" id="screen-email">
    <button class="export-all-btn" onclick="exportAll()">
      <span>📤</span><span id="export-label">Export All Records</span>
    </button>
    <div class="email-tabs">
      <button class="email-tab active" id="etab-user" onclick="setEmailTab('user')">👤 By User</button>
      <button class="email-tab" id="etab-site" onclick="setEmailTab('site')">🏢 By Site</button>
    </div>
    <div class="email-list" id="email-list"></div>
  </div>

  <div class="tabbar">
    <button class="tab-btn active" onclick="gotoTab('scan')" id="tb-scan">
      <div class="tab-icon">📷</div><div class="tab-label">Scan</div>
    </button>
    <button class="tab-btn" onclick="gotoTab('records')" id="tb-records">
      <div class="tab-icon">📋</div><div class="tab-label">Records</div>
    </button>
    <button class="tab-btn" onclick="gotoTab('email')" id="tb-email">
      <div class="tab-icon">✉️</div><div class="tab-label">Email</div>
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span>🔖</span>
      <span class="modal-title" id="modal-title">New Scan</span>
    </div>
    <div class="barcode-box">
      <div class="barcode-lbl">Barcode</div>
      <div class="barcode-val" id="modal-barcode">—</div>
    </div>
    <div class="existing-notice" id="modal-existing" style="display:none">
      ℹ️ <span id="modal-existing-text"></span>
    </div>
    <div class="field-label">Username *</div>
    <input class="field-input" id="modal-username" type="text" placeholder="e.g. john.doe" autocapitalize="none" autocorrect="off">
    <div class="field-label">Site *</div>
    <input class="field-input" id="modal-site" type="text" placeholder="e.g. Warehouse A, HQ">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecord()">💾 Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ZXing barcode library - better iOS support -->
<script src="https://unpkg.com/@zxing/browser@latest"></script>
<script>
const STORAGE_KEY = 'bt_records_v2';
let currentTab = 'scan';
let emailTab = 'user';
let activeFilter = 'all';
let pendingBarcode = '';
let codeReader = null;
let scanControls = null;
let scanning = false;

// ── STORAGE ──
function getRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; }
}
function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }
function findByBarcode(bc) { return getRecords().find(r=>r.barcode===bc)||null; }
function upsertRecord(data) {
  const records = getRecords();
  const idx = records.findIndex(r=>r.barcode===data.barcode);
  const now = new Date().toISOString();
  if (idx>=0) { records[idx]={...records[idx],...data,updatedAt:now}; }
  else { records.push({id:Date.now().toString(),...data,createdAt:now,updatedAt:now}); }
  saveRecords(records);
}
function deleteRecordById(id) { saveRecords(getRecords().filter(r=>r.id!==id)); }

// ── TABS ──
const tabHeaders = {scan:'Scan Barcode', records:'All Records', email:'Send Email'};
const tabBadges  = {scan:'SCANNER',      records:'RECORDS',     email:'EMAIL'};
function gotoTab(tab) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('tb-'+tab).classList.add('active');
  document.getElementById('header-title').textContent = tabHeaders[tab];
  document.getElementById('header-badge').textContent = tabBadges[tab];
  currentTab = tab;
  if (tab==='records') renderRecords();
  if (tab==='email')   renderEmail();
  // stop scanner when leaving scan tab
  if (tab!=='scan' && scanning) stopScanner();
}

// ── SCANNER (ZXing) ──
async function startScanner() {
  document.getElementById('scan-start-btn').style.display = 'none';

  try {
    // Use ZXingBrowser's BrowserMultiFormatReader — best cross-format iOS support
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();

    const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
    // prefer back camera
    let deviceId = undefined;
    if (devices && devices.length > 0) {
      const back = devices.find(d => /back|rear|environment/i.test(d.label));
      if (back) deviceId = back.deviceId;
      else if (devices.length > 1) deviceId = devices[devices.length - 1].deviceId;
    }

    scanning = true;
    document.getElementById('scan-hint').textContent = 'Hold barcode steady in the frame';

    scanControls = await codeReader.decodeFromVideoDevice(deviceId, 'preview', (result, err) => {
      if (result) {
        const text = result.getText();
        if (text) onScanned(text);
      }
    });

  } catch(e) {
    console.error(e);
    document.getElementById('scan-start-btn').style.display = 'flex';
    document.getElementById('scan-hint').textContent = 'Camera error — check permissions in Safari settings';
    showToast('❌ Camera error: ' + e.message, 'error');
  }
}

function stopScanner() {
  if (scanControls) {
    try { scanControls.stop(); } catch {}
    scanControls = null;
  }
  codeReader = null;
  scanning = false;
}

function onScanned(text) {
  stopScanner();
  pendingBarcode = text;
  openModal(text);
}

// ── MODAL ──
function openModal(barcode) {
  const existing = findByBarcode(barcode);
  document.getElementById('modal-barcode').textContent = barcode;
  document.getElementById('modal-title').textContent = existing ? 'Update Record' : 'New Scan';
  const notice = document.getElementById('modal-existing');
  if (existing) {
    notice.style.display = 'flex';
    document.getElementById('modal-existing-text').textContent =
      `Previously linked to ${existing.username} at ${existing.site}`;
    document.getElementById('modal-username').value = existing.username;
    document.getElementById('modal-site').value = existing.site;
  } else {
    notice.style.display = 'none';
    document.getElementById('modal-username').value = '';
    document.getElementById('modal-site').value = '';
  }
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-username').focus(), 350);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  if (currentTab==='scan') setTimeout(startScanner, 300);
}

function saveRecord() {
  const username = document.getElementById('modal-username').value.trim();
  const site     = document.getElementById('modal-site').value.trim();
  if (!username) { document.getElementById('modal-username').focus(); showToast('⚠️ Username required','error'); return; }
  if (!site)     { document.getElementById('modal-site').focus();     showToast('⚠️ Site required','error'); return; }
  upsertRecord({barcode:pendingBarcode, username, site});
  document.getElementById('modal').classList.remove('open');
  showToast(`✓ Saved — ${username} @ ${site}`,'success');
  if (currentTab==='scan') setTimeout(startScanner, 300);
}

document.getElementById('modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('modal')) closeModal();
});
document.getElementById('modal-username').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('modal-site').focus(); });
document.getElementById('modal-site').addEventListener('keydown',e=>{ if(e.key==='Enter') saveRecord(); });

// ── RECORDS ──
function setFilter(btn, filter) {
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = filter;
  filterRecords();
}
function filterRecords() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let records = getRecords().sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  if (q) records = records.filter(r=>{
    if (activeFilter==='username') return r.username.toLowerCase().includes(q);
    if (activeFilter==='site')     return r.site.toLowerCase().includes(q);
    return r.username.toLowerCase().includes(q)||r.site.toLowerCase().includes(q)||r.barcode.toLowerCase().includes(q);
  });
  renderRecordList(records);
}
function renderRecords() {
  if (document.getElementById('search-input')) document.getElementById('search-input').value='';
  renderRecordList(getRecords().sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)));
}
function renderRecordList(records) {
  document.getElementById('count-badge').textContent=`${records.length} record${records.length!==1?'s':''}`;
  const list = document.getElementById('records-list');
  if (!records.length) {
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🗂️</div><div class="empty-title">No records found</div><div class="empty-sub">Scan a barcode on the Scan tab to add your first record</div></div>`;
    return;
  }
  list.innerHTML = records.map(r=>`
    <div class="record-card">
      <div class="record-avatar">${esc(r.username[0].toUpperCase())}</div>
      <div class="record-body">
        <div class="record-name">${esc(r.username)}</div>
        <div class="record-site">📍 ${esc(r.site)}</div>
        <div class="record-barcode">${esc(r.barcode)}</div>
        <div class="record-date">${new Date(r.updatedAt).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}</div>
      </div>
      <button class="record-delete" onclick="confirmDelete('${r.id}')">🗑</button>
    </div>`).join('');
}
function confirmDelete(id) {
  if (!confirm('Delete this record?')) return;
  deleteRecordById(id);
  renderRecords();
  showToast('🗑 Deleted');
}

// ── EMAIL ──
function setEmailTab(tab) {
  emailTab = tab;
  document.getElementById('etab-user').classList.toggle('active', tab==='user');
  document.getElementById('etab-site').classList.toggle('active', tab==='site');
  renderEmail();
}
function renderEmail() {
  const records = getRecords();
  document.getElementById('export-label').textContent=`Export All Records (${records.length})`;
  const list = document.getElementById('email-list');
  if (emailTab==='user') {
    const users = [...new Set(records.map(r=>r.username))].sort();
    if (!users.length) { list.innerHTML=emptyHTML('✉️','Nothing to send','Scan some barcodes first'); return; }
    list.innerHTML = users.map(u=>{
      const count = records.filter(r=>r.username===u).length;
      return `<div class="email-item">
        <div class="email-avatar user-av">${esc(u[0].toUpperCase())}</div>
        <div class="email-info"><div class="email-name">${esc(u)}</div><div class="email-count">${count} barcode${count!==1?'s':''}</div></div>
        <button class="email-send-btn" onclick="sendByUser(${JSON.stringify(u)})">✉️ Email</button>
      </div>`;
    }).join('');
  } else {
    const sites = [...new Set(records.map(r=>r.site))].sort();
    if (!sites.length) { list.innerHTML=emptyHTML('🏢','Nothing to send','Scan some barcodes first'); return; }
    list.innerHTML = sites.map(s=>{
      const count = records.filter(r=>r.site===s).length;
      return `<div class="email-item">
        <div class="email-avatar site-av">🏢</div>
        <div class="email-info"><div class="email-name">${esc(s)}</div><div class="email-count">${count} barcode${count!==1?'s':''}</div></div>
        <button class="email-send-btn site-btn" onclick="sendBySite(${JSON.stringify(s)})">✉️ Email</button>
      </div>`;
    }).join('');
  }
}
function emptyHTML(icon,title,sub) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
}
function sendByUser(username) {
  const records = getRecords().filter(r=>r.username===username);
  const lines = [`Barcode Records — User: ${username}`,`Total: ${records.length} record(s)`,'',
    ...records.map(r=>`• Barcode: ${r.barcode} | Site: ${r.site} | Added: ${new Date(r.createdAt).toLocaleDateString()}`),
    '',`Generated: ${new Date().toLocaleString()}`];
  openMailto(`Barcode Records — ${username}`, lines.join('\n'));
}
function sendBySite(site) {
  const records = getRecords().filter(r=>r.site===site);
  const byUser = {};
  records.forEach(r=>{ (byUser[r.username]=byUser[r.username]||[]).push(r); });
  const lines = [`Barcode Records — Site: ${site}`,`Total: ${records.length} record(s) across ${Object.keys(byUser).length} user(s)`,''];
  for (const [user,recs] of Object.entries(byUser)) {
    lines.push(`── ${user}`);
    recs.forEach(r=>lines.push(`   • ${r.barcode} | Added: ${new Date(r.createdAt).toLocaleDateString()}`));
    lines.push('');
  }
  lines.push(`Generated: ${new Date().toLocaleString()}`);
  openMailto(`Barcode Records — Site: ${site}`, lines.join('\n'));
}
function exportAll() {
  const records = getRecords();
  if (!records.length) { showToast('⚠️ No records to export','error'); return; }
  const bySite = {};
  records.forEach(r=>{ (bySite[r.site]=bySite[r.site]||[]).push(r); });
  const lines = ['FULL BARCODE EXPORT',`Total: ${records.length} records | Sites: ${Object.keys(bySite).length}`,''];
  for (const [site,recs] of Object.entries(bySite)) {
    lines.push(`━━ ${site.toUpperCase()}`);
    recs.forEach(r=>lines.push(`   • ${r.username} | ${r.barcode} | ${new Date(r.createdAt).toLocaleDateString()}`));
    lines.push('');
  }
  lines.push(`Generated: ${new Date().toLocaleString()}`);
  openMailto(`Full Barcode Export — ${new Date().toLocaleDateString()}`, lines.join('\n'));
}
function openMailto(subject, body) {
  const a = document.createElement('a');
  a.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  a.click();
  showToast('📬 Mail app opening…','success');
}

// ── UTILS ──
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
